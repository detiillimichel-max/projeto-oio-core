<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Interstellar</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        #camera-fundo { width: 100vw; height: 100vh; object-fit: cover; position: fixed; z-index: 1; filter: brightness(0.4); }
        .camada { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #camada-vibe { display: none; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); }
        #lista-msgs { flex: 1; overflow-y: auto; width: 90%; padding: 20px; font-size: 18px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #00f2fe; }
        .controles { display: flex; width: 100%; padding: 15px; background: rgba(255,255,255,0.1); }
        input { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 16px; }
        button { padding: 15px 25px; margin-left: 10px; border-radius: 12px; border: none; background: #00f2fe; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <video id="camera-fundo" autoplay playsinline muted loop></video>

    <div id="camada-identidade" class="camada">
        <h1 style="color: #00f2fe; text-shadow: 0 0 15px #00f2fe;">OIO ONE</h1>
        <input id="nome-user" type="text" placeholder="Seu Nome..." style="width: 70%;">
        <button onclick="entrarOIO()" style="margin-top: 20px; width: 80%;">ENTRAR NO PORTAL</button>
    </div>

    <div id="camada-vibe" class="camada">
        <div id="lista-msgs"></div>
        <div class="controles">
            <input id="msg-txt" type="text" placeholder="Sua vibe...">
            <button onclick="enviarVibe()">ENVIAR</button>
        </div>
    </div>

    <audio id="somMsg" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://vibe-app-bbba7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function entrarOIO() {
            const nome = document.getElementById('nome-user').value || "Michel";
            localStorage.setItem("oio_user", nome);
            document.getElementById('camada-identidade').style.display = 'none';
            document.getElementById('camada-vibe').style.display = 'flex';
            
            // Ativa áudio após clique do usuário (regra do navegador)
            document.getElementById('somMsg').play().then(() => {
                document.getElementById('somMsg').pause();
            });

            // Escuta mensagens
            db.ref("chat_geral").limitToLast(15).on("value", (snap) => {
                const lista = document.getElementById('lista-msgs');
                lista.innerHTML = "";
                snap.forEach(item => {
                    lista.innerHTML += `<div class="balao"><b>${item.val().autor}:</b> ${item.val().texto}</div>`;
                });
                lista.scrollTop = lista.scrollHeight;
                document.getElementById('somMsg').play();
            });
        }

        function enviarVibe() {
            const txt = document.getElementById('msg-txt').value;
            const autor = localStorage.getItem("oio_user");
            if(txt) {
                db.ref("chat_geral").push({ texto: txt, autor: autor, data: Date.now() });
                document.getElementById('msg-txt').value = "";
            }
        }
    </script>
</body>
</html>
