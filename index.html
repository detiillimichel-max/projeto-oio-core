<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - MICHEL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #camera-fundo { width: 100vw; height: 100vh; object-fit: cover; position: fixed; z-index: 1; filter: brightness(0.4); }
        
        /* CAMADA 1: IDENTIDADE (CAPA DO LIVRO) */
        #camada-identidade { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .circulo-foto { width: 150px; height: 150px; border: 3px solid #00f2fe; border-radius: 50%; margin-bottom: 20px; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; font-size: 50px; }

        /* CAMADA 2: INTERAÇÃO (PÁGINA DO CHAT) */
        #camada-vibe { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column; }
        #janela-mensagens { flex: 1; margin: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(0,242,254,0.3); display: flex; flex-direction: column; padding: 15px; }
        #lista-msgs { flex: 1; overflow-y: auto; font-size: 22px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #00f2fe; }

        /* RODAPÉ COM ÍCONES PEQUENOS */
        .area-escrita { display: flex; gap: 8px; padding: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: none; font-size: 18px; }
        .menu-inferior { display: flex; justify-content: space-around; padding: 15px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 30px 30px 0 0; }
        .btn-mini { font-size: 24px; background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
    </style>
</head>
<body>
    <video id="camera-fundo" autoplay playsinline></video>

    <div id="camada-identidade">
        <div class="circulo-foto" onclick="document.getElementById('input-foto').click()">👤</div>
        <input type="file" id="input-foto" hidden>
        <input id="nome-user" type="text" placeholder="Seu Nome..." style="width: 70%; padding: 15px; border-radius: 10px; text-align: center; font-size: 20px;">
        <button onclick="entrarOIO()" style="margin-top: 20px; padding: 15px 40px; border-radius: 10px; background: #00f2fe; font-weight: bold;">ENTRAR NO OIO</button>
    </div>

    <div id="camada-vibe">
        <div id="janela-mensagens">
            <div id="lista-msgs"></div>
            <div class="area-escrita">
                <input id="msg-txt" type="text" placeholder="Vibe...">
                <button onclick="enviar()" style="background:#00f2fe; border:none; border-radius:10px; padding:10px 20px; font-weight:bold;">➔</button>
            </div>
        </div>
        
        <div class="menu-inferior">
            <button class="btn-mini" onclick="abrirTelefone()">📞<br>LIGAR</button>
            <button class="btn-mini" onclick="location.reload()">📷<br>CÂMERA</button>
            <button class="btn-mini" onclick="window.open('https://youtube.com')">📺<br>YOUTUBE</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = localStorage.getItem("oio_user");
        if(meuNome) { document.getElementById('nome-user').value = meuNome; }

        function entrarOIO() {
            meuNome = document.getElementById('nome-user').value || "Michel";
            localStorage.setItem("oio_user", meuNome);
            document.getElementById('camada-identidade').style.display = 'none';
            document.getElementById('camada-vibe').style.display = 'flex';
            
            // ATIVA CÂMERA AO ENTRAR
            navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => {
                document.getElementById('camera-fundo').srcObject = s;
            });

            // ESCUTA MENSAGENS
            db.ref('chat_geral').limitToLast(15).on('value', (s) => {
                const lista = document.getElementById('lista-msgs');
                lista.innerHTML = "";
                s.forEach(child => {
                    lista.innerHTML += `<div class="balao"><b>${child.val().autor}:</b><br>${child.val().texto}</div>`;
                });
                lista.scrollTop = lista.scrollHeight;
            });
        }

        function enviar() {
            const input = document.getElementById('msg-txt');
            if(input.value) {
                db.ref('chat_geral').push({ texto: input.value, autor: meuNome, data: Date.now() });
                input.value = "";
            }
        }

        function abrirTelefone() {
            let num = prompt("Número para ligar:");
            if(num) window.open('tel:' + num);
        }
    </script>
</body>
</html>
