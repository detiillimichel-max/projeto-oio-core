<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 18px; border-left: 4px solid #00f2fe; max-width: 80%; animation: surge 0.3s ease; }
        @keyframes surge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .minha { align-self: flex-end; border-left: none; border-right: 4px solid #fff; background: rgba(255,255,255,0.1); }
        .foto-perfil { width: 24px; height: 24px; border-radius: 50%; background: #00f2fe; color: #000; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; margin-right: 5px; font-weight: bold; }
        .info-msg { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        .controles { position: fixed; bottom: 0; width: 100%; padding: 10px; background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; box-sizing: border-box; border-top: 1px solid #333; z-index: 100; }
        .btn-extra { background: none; border: none; font-size: 22px; color: #00f2fe; padding: 5px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 16px; outline: none; }
        .btn-enviar { width: 50px; height: 50px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; }
        #menu-clipe { position: fixed; bottom: 80px; left: 10px; right: 10px; background: #fff; border-radius: 20px; display: none; grid-template-columns: repeat(3, 1fr); padding: 20px; gap: 15px; color: #000; z-index: 101; }
        .item-modulo { text-align: center; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="caixa-msg"></div>
    <div id="menu-clipe">
        <div class="item-modulo" onclick="abrir('https://mail.google.com')">📧<br>Gmail</div>
        <div class="item-modulo" onclick="abrir('https://youtube.com')">📺<br>YouTube</div>
        <div class="item-modulo" onclick="abrir('https://news.google.com')">📰<br>Notícias</div>
        <div class="item-modulo" onclick="abrir('https://maps.google.com')">📍<br>Maps</div>
        <div class="item-modulo" onclick="document.getElementById('file-input').click()">📷<br>Galeria</div>
        <div class="item-modulo" onclick="location.href='tel:+5511978533338'">📞<br>Ligar</div>
    </div>
    <div class="controles">
        <button class="btn-extra" onclick="toggleMenu()">📎</button>
        <input id="msg-input" placeholder="Sua vibe..." autocomplete="off">
        <button class="btn-enviar" onclick="enviar()">➤</button>
        <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:3938e86538bf8a04a05323"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let meuNome = localStorage.getItem("oio_nome") || prompt("Nome OIO ONE:") || "Michel";
        localStorage.setItem("oio_nome", meuNome);
        const somNotifica = new Audio("https://actions.google.com/sounds/v1/notification_effects/success_musical_notification.ogg");

        function toggleMenu() { const m = document.getElementById('menu-clipe'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }
        function abrir(url) { window.open(url, '_blank'); toggleMenu(); }

        db.ref("chat_geral").limitToLast(20).on("child_added", snap => {
            const msg = snap.val();
            const div = document.createElement("div");
            const hora = new Date(msg.data).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            div.className = "balao" + (msg.autor === meuNome ? " minha" : "");
            const inicial = msg.autor.charAt(0).toUpperCase();
            div.innerHTML = `<div class="foto-perfil">${inicial}</div> <strong>${msg.autor}</strong><br>${msg.texto}<span class="info-msg">${hora}</span>`;
            document.getElementById("caixa-msg").appendChild(div);
            document.getElementById("caixa-msg").scrollTop = 999999;
            if(msg.autor !== meuNome) {
                somNotifica.play().catch(()=>{}); // Som de sistema [cite: 2026-02-24]
                if(navigator.vibrate) navigator.vibrate(200);
            }
        });

        function enviar() {
            const input = document.getElementById("msg-input");
            if (input.value.trim()) {
                db.ref("chat_geral").push({ autor: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
                if(document.getElementById('menu-clipe').style.display === 'grid') toggleMenu();
            }
        }
        document.getElementById("msg-input").addEventListener("keypress", e => { if(e.key === "Enter") enviar(); });
    </script>
</body>
</html>
