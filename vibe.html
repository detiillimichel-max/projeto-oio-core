<script>
    // 1. Configuração de Identidade com Foto
    let meuNome = localStorage.getItem("oio_nome") || prompt("Nome OIO ONE:") || "Michel";
    let minhaFoto = localStorage.getItem("oio_foto") || "👤"; // Emoji enquanto não carrega arquivo
    localStorage.setItem("oio_nome", meuNome);

    // 2. Som de Recebimento (Link de sistema direto)
    const somNotifica = new Audio("https://actions.google.com/sounds/v1/notification_effects/success_musical_notification.ogg");

    db.ref("chat_geral").limitToLast(20).on("child_added", snap => {
        const msg = snap.val();
        const div = document.createElement("div");
        const hora = new Date(msg.data).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        div.className = "balao" + (msg.autor === meuNome ? " minha" : "");
        // Aqui a foto aparece antes do nome
        div.innerHTML = `<span>${minhaFoto}</span> <strong>${msg.autor}</strong><br>${msg.texto}<span class="info-msg">${hora}</span>`;
        
        document.getElementById("caixa-msg").appendChild(div);
        document.getElementById("caixa-msg").scrollTop = 999999;

        // Tocar som APENAS se a mensagem for do outro
        if(msg.autor !== meuNome) {
            somNotifica.play().catch(e => console.log("Aguardando interação para som"));
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]); // Camada Sensorial
        }
    });
</script>
