<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #fundo-foto { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://github.com/detiillimichel.png') no-repeat center; background-size: cover; filter: blur(10px) brightness(0.3); z-index: -1; }
        .gaveta-vidro { width: 90%; background: rgba(0, 255, 255, 0.05); backdrop-filter: blur(20px); border: 2px solid #00f2fe; border-radius: 30px; padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
        #caixa-msg { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .balao { background: rgba(0, 40, 50, 0.8); padding: 15px; border-radius: 15px; border-left: 5px solid #00f2fe; }
        .minha-msg { border-left: none; border-right: 5px solid #fff; background: rgba(20, 20, 20, 0.8); align-self: flex-end; }
        input { background: #fff; border: none; padding: 15px; border-radius: 10px; color: #333; font-size: 16px; outline: none; }
        #btn-enviar { background: #00f2fe; color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .status-online { font-size: 10px; color: #00f2fe; text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="fundo-foto"></div>
    <div class="gaveta-vidro">
        <div id="caixa-msg"></div>
        <input id="vibe-txt" type="text" placeholder="Sua mensagem..." onkeypress="if(event.key==='Enter') enviar()">
        <button id="btn-enviar" onclick="enviar()">ENVIAR</button>
        <div style="text-align: center; color: #666; font-size: 12px;">FECHAR</div>
    </div>
    <div class="status-online">ONLINE: Michel Detilli</div>

    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let meuNome = "Michel Detilli";

        db.ref("chat_geral").limitToLast(10).on("child_added", (snap) => {
            const msg = snap.val();
            const caixa = document.getElementById('caixa-msg');
            const div = document.createElement("div");
            div.className = "balao" + (msg.autor === meuNome ? " minha-msg" : "");
            div.innerHTML = `<strong>${msg.autor} :</strong><br>${msg.texto}`;
            caixa.appendChild(div);
            caixa.scrollTop = caixa.scrollHeight;
        });

        function enviar() {
            const input = document.getElementById('vibe-txt');
            if (input.value.trim()) {
                db.ref("chat_geral").push({ autor: meuNome, texto: input.value });
                input.value = "";
            }
        }
    </script>
</body>
</html>
