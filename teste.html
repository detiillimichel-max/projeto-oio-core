<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO ONE - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 15px; border-left: 4px solid #00f2fe; max-width: 80%; }
        .minha { align-self: flex-end; border-left: none; border-right: 4px solid #fff; background: rgba(255,255,255,0.1); }
        .controles { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #111; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 16px; outline: none; }
        button { width: 55px; height: 55px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="caixa-msg"></div>
    <div class="controles">
        <input id="msg-input" placeholder="Sua vibe..." autocomplete="off">
        <button onclick="enviar()">➤</button>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:3938e86538bf8a04a05323"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let meuNome = localStorage.getItem("oio_nome") || prompt("Nome OIO ONE:") || "Michel";
        localStorage.setItem("oio_nome", meuNome);

        db.ref("chat_geral").limitToLast(15).on("child_added", snap => {
            const msg = snap.val();
            const div = document.createElement("div");
            div.className = "balao" + (msg.autor === meuNome ? " minha" : "");
            div.innerHTML = "<strong>" + msg.autor + "</strong><br>" + msg.texto;
            document.getElementById("caixa-msg").appendChild(div);
            document.getElementById("caixa-msg").scrollTop = 999999;
        });

        function enviar() {
            const input = document.getElementById("msg-input");
            if (input.value.trim()) {
                db.ref("chat_geral").push({ autor: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
            }
        }
    </script>
</body>
</html>
