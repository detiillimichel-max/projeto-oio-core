<script>
    const firebaseConfig = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // PERGUNTA O NOME ASSIM QUE ABRE
    let meuNome = localStorage.getItem("usuario_oio") || prompt("Qual é o seu nome?");
    if(!meuNome) meuNome = "Visitante";
    localStorage.setItem("usuario_oio", meuNome);

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => document.getElementById('camera').srcObject = s);

    function abrirVibe() {
        document.getElementById('janela-chat').style.display = 'flex';
        db.ref('chat_geral').limitToLast(15).on('value', (snapshot) => {
            const lista = document.getElementById('lista-msgs');
            lista.innerHTML = "";
            snapshot.forEach(item => {
                const dado = item.val();
                // COLOCA LADOS DIFERENTES PARA VOCÊ E PARA OS OUTROS
                const alinhamento = dado.autor === meuNome ? "text-align:right; color:#00f2fe;" : "text-align:left; color:#fff;";
                lista.innerHTML += `<div class="balao" style="${alinhamento}"><b>${dado.autor}:</b><br>${dado.texto}</div>`;
            });
            document.getElementById('somMsg').play();
            lista.scrollTop = lista.scrollHeight;
        });
    }

    function enviarVibeReal() {
        const input = document.getElementById('campo-texto');
        if(input.value) {
            // AGORA ENVIA COM O NOME QUE A PESSOA DIGITOU
            db.ref('chat_geral').push({ 
                texto: input.value, 
                autor: meuNome, 
                data: Date.now() 
            });
            input.value = "";
        }
    }
</script>
