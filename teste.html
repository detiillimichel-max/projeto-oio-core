<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 18px; border-left: 4px solid #00f2fe; max-width: 80%; position: relative; }
        .minha { align-self: flex-end; border-left: none; border-right: 4px solid #fff; background: rgba(255,255,255,0.1); }
        .info-msg { font-size: 10px; opacity: 0.5; margin-top: 5px; display: block; text-align: right; }
        .controles { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #111; display: flex; align-items: center; gap: 8px; box-sizing: border-box; border-top: 1px solid #333; }
        .btn-extra { background: none; border: none; font-size: 20px; cursor: pointer; color: #00f2fe; padding: 5px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; outline: none; font-size: 16px; }
        .btn-enviar { width: 50px; height: 50px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="caixa-msg"></div>

    <div class="controles">
        <button class="btn-extra" onclick="document.getElementById('file-input').click()">📷</button>
        <button class="btn-extra" onclick="window.location.href='tel:+5511999999999'">📞</button>
        <input id="msg-input" placeholder="Sua vibe..." autocomplete="off">
        <button class="btn-enviar" onclick="enviar()">➤</button>
        <input type="file" id="file-input" style="display:none" accept="image/*,video/*">
    </div>

    <audio id="som-notifica" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:3938e86538bf8a04a05323"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let meuNome = localStorage.getItem("oio_nome") || prompt("Nome OIO ONE:") || "Michel";
        localStorage.setItem("oio_nome", meuNome);

        let ultimoEnvio = 0;

        db.ref("chat_geral").limitToLast(20).on("child_added", snap => {
            const msg = snap.val();
            const div = document.createElement("div");
            const hora = new Date(msg.data).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const data = new Date(msg.data).toLocaleDateString();
            
            div.className = "balao" + (msg.autor === meuNome ? " minha" : "");
            div.innerHTML = `<strong>${msg.autor}</strong><br>${msg.texto}<span class="info-msg">${data} - ${hora}</span>`;
            
            document.getElementById("caixa-msg").appendChild(div);
            document.getElementById("caixa-msg").scrollTop = 999999;

            if(msg.autor !== meuNome) {
                document.getElementById("som-notifica").play().catch(()=>{});
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        });

        function enviar() {
            const input = document.getElementById("msg-input");
            const agora = Date.now();

            if (agora - ultimoEnvio < 3000) {
                alert("Calma! Anti-spam ativo (espere 3s)");
                return;
            }

            if (input.value.trim()) {
                ultimoEnvio = agora;
                db.ref("chat_geral").push({
                    autor: meuNome,
                    texto: input.value,
                    data: agora
                });
                input.value = "";
            }
        }

        document.getElementById("msg-input").addEventListener("keypress", e => { if(e.key === "Enter") enviar(); });
    </script>
</body>
</html>
