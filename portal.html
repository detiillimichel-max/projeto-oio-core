  <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle, #001219, #000); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 10px 15px; border-radius: 15px; border-left: 3px solid #00f2fe; align-self: flex-start; max-width: 85%; }
        .minha-msg { align-self: flex-end; border-left: none; border-right: 3px solid #fff; background: rgba(255,255,255,0.1); }
        .controles { padding: 15px; background: #000; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; font-size: 16px; }
        button { width: 50px; height: 50px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="caixa-msg"></div>
    <div class="controles">
        <input id="vibe-txt" type="text" placeholder="Sua vibe..." autocomplete="off">
        <button onclick="enviar()">🚀</button>
    </div>
    <audio id="somBip" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>
    <script>
        const config = { databaseURL: "https://vibe-app-bbba7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let meuNome = localStorage.getItem("oio_nome") || prompt("Nome no Portal:") || "Michel";
        localStorage.setItem("oio_nome", meuNome);
        let carregando = true;
        db.ref("chat_geral").once("value", () => { carregando = false; });
        db.ref("chat_geral").limitToLast(20).on("child_added", (snap) => {
            const msg = snap.val();
            const caixa = document.getElementById('caixa-msg');
            const div = document.createElement("div");
            div.className = "balao " + (msg.autor === meuNome ? "minha-msg" : "");
            div.innerHTML = `<strong>${msg.autor}</strong><br>${msg.texto}`;
            caixa.appendChild(div);
            caixa.scrollTop = caixa.scrollHeight;
            if (!carregando && msg.autor !== meuNome) {
                document.getElementById('somBip').play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate(100);
            }
        });
        function enviar() {
            const input = document.getElementById('vibe-txt');
            if(input.value.trim()) {
                db.ref("chat_geral").push({ autor: meuNome, texto: input.value, data: Date.now() });
                input.value = "";
            }
        }
    </script>
</body>
</html>
