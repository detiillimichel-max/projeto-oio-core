<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - SOM E TXT</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        /* Janela principal simples para não travar */
        #caixa-oio { position: fixed; inset: 10px; border: 1px solid #00f2fe; border-radius: 25px; display: flex; flex-direction: column; padding: 15px; background: #000; }
        #lista-msgs { flex: 1; overflow-y: auto; font-size: 22px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #00f2fe; }
        .controles { display: flex; gap: 8px; padding-top: 10px; }
        input { flex: 1; padding: 18px; border-radius: 12px; border: none; font-size: 18px; }
        button { padding: 18px 25px; border-radius: 12px; background: #00f2fe; border: none; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <audio id="somVibe" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="caixa-oio">
        <div id="lista-msgs"></div>
        <div class="controles">
            <input id="campo-txt" type="text" placeholder="Escreva...">
            <button onclick="enviarVibe()">➔</button>
        </div>
        <p style="text-align:center; font-size:12px; color:#00f2fe; margin-top:10px;">ONLINE: Michel Detilli</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function enviarVibe() {
            const campo = document.getElementById('campo-txt');
            if(campo.value) {
                // Toca o som de envio (Camada Sensorial)
                document.getElementById('somVibe').play();
                db.ref('chat_geral').push({ texto: campo.value, autor: "Michel Detilli", data: Date.now() });
                campo.value = "";
            }
        }

        // Recebe mensagens em tempo real
        db.ref('chat_geral').limitToLast(10).on('value', (snapshot) => {
            const lista = document.getElementById('lista-msgs');
            lista.innerHTML = "";
            snapshot.forEach(item => {
                const msg = item.val();
                lista.innerHTML += `<div class="balao"><b>${msg.autor}:</b><br>${msg.texto}</div>`;
            });
            // Toca som quando chega mensagem nova
            document.getElementById('somVibe').play();
            lista.scrollTop = lista.scrollHeight;
        });
    </script>
</body>
</html>
