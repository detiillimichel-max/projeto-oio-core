<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE SENSORAL</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        #janela-chat { position: fixed; inset: 10px; background: rgba(0,242,254,0.05); border: 1px solid #00f2fe; border-radius: 30px; display: flex; flex-direction: column; padding: 15px; }
        #lista-msgs { flex: 1; overflow-y: auto; font-size: 22px; }
        .balao { background: rgba(0, 242, 254, 0.15); padding: 15px; border-radius: 20px; margin-bottom: 12px; border-left: 5px solid #00f2fe; }
        .area-input { display: flex; gap: 10px; padding: 10px; }
        input { flex: 1; padding: 20px; border-radius: 15px; border: none; font-size: 20px; }
        button { padding: 20px; border-radius: 15px; background: #00f2fe; border: none; font-weight: bold; font-size: 22px; }
    </style>
</head>
<body>
    <audio id="bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="janela-chat">
        <div id="lista-msgs"></div>
        <div class="area-input">
            <input id="txt" type="text" placeholder="Vibe...">
            <button onclick="enviar()">➔</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        const meuNome = localStorage.getItem("oio_user") || "Michel Detilli";

        function enviar() {
            const input = document.getElementById('txt');
            if(input.value) {
                // Toca o som ao enviar (Confirmando a ação)
                document.getElementById('bip').play();
                db.ref('chat_geral').push({ texto: input.value, autor: meuNome, data: Date.now() });
                input.value = "";
            }
        }

        // Escuta e toca o som quando chegar mensagem de fora
        db.ref('chat_geral').limitToLast(12).on('value', (s) => {
            const lista = document.getElementById('lista-msgs');
            lista.innerHTML = "";
            s.forEach(child => {
                lista.innerHTML += `<div class="balao"><b>${child.val().autor}:</b><br>${child.val().texto}</div>`;
            });
            document.getElementById('bip').play(); // Som sensorial de chegada
            lista.scrollTop = lista.scrollHeight;
        });
    </script>
</body>
</html>
