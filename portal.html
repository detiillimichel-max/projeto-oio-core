<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE REAL</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; }
        #chat { position: fixed; inset: 10px; border: 2px solid #00f2fe; border-radius: 25px; display: flex; flex-direction: column; padding: 15px; background: rgba(0,0,0,0.9); }
        #lista { flex: 1; overflow-y: auto; font-size: 22px; }
        .balao { background: rgba(0,242,254,0.1); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid #00f2fe; }
        input { width: 85%; padding: 18px; border-radius: 12px; border: none; font-size: 18px; margin-top: 10px; }
        button { width: 100%; padding: 20px; border-radius: 12px; background: #00f2fe; border: none; font-weight: bold; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>
    <audio id="bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <div id="chat">
        <div id="lista"></div>
        <input id="msg" type="text" placeholder="Escreva...">
        <button onclick="enviar()">ENVIAR</button>
        <p style="text-align:center; font-size:12px; color:#00f2fe; margin-top:10px;">ONLINE: Michel Detilli</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function enviar() {
            const i = document.getElementById('msg');
            if(i.value) {
                db.ref('chat_geral').push({ texto: i.value, autor: "Michel Detilli", data: Date.now() });
                i.value = "";
            }
        }

        db.ref('chat_geral').limitToLast(10).on('value', (s) => {
            const l = document.getElementById('lista');
            l.innerHTML = "";
            s.forEach(c => {
                l.innerHTML += `<div class="balao"><b>${c.val().autor}:</b><br>${c.val().texto}</div>`;
            });
            document.getElementById('bip').play();
            l.scrollTop = l.scrollHeight;
        });
    </script>
</body>
</html>
