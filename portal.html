<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Portal Estelar</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* DNA OIO: Interface de Profundidade e Galáxia Animada */
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001219 0%, #000 100%);
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: galaxia 60s linear infinite;
            z-index: -1;
        }

        @keyframes galaxia {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        #caixa-msg { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scroll-behavior: smooth;
        }

        /* Balões Blindados e Estilizados */
        .balao { 
            background: rgba(0, 242, 254, 0.08); 
            padding: 12px 16px; 
            border-radius: 18px; 
            border-left: 3px solid #00f2fe; 
            align-self: flex-start; 
            max-width: 85%; 
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .minha-msg { 
            align-self: flex-end; 
            border-left: none; 
            border-right: 3px solid #fff; 
            background: rgba(255,255,255,0.08); 
        }

        small { 
            display: block; 
            font-size: 10px; 
            opacity: 0.5; 
            margin-top: 4px; 
            text-align: right; 
        }

        /* Controles Ergonomia Dinâmica */
        .controles { 
            padding: 15px; 
            background: rgba(0,0,0,0.6); 
            display: flex; 
            gap: 10px; 
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 25px; 
            border: 1px solid rgba(0,242,254,0.3); 
            background: #000; 
            color: #fff; 
            outline: none; 
            font-size: 16px;
        }

        button { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            border: none; 
            background: #00f2fe; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer;
            box-shadow: 0 0 15px #00f2fe66;
        }
    </style>
</head>
<body>

    <div id="caixa-msg"></div>

    <div class="controles">
        <input id="minha-vibe" type="text" placeholder="Escreva sua vibe..." autocomplete="off">
        <button onclick="enviarVibe()">🚀</button>
    </div>

    <audio id="somBip" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://vibe-app-bbba7-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = localStorage.getItem("oio_nome");
        if (!meuNome) {
            meuNome = prompt("Identidade OIO ONE - Qual seu nome?") || "Michel";
            localStorage.setItem("oio_nome", meuNome);
        }

        let carregamentoInicial = true;
        db.ref("chat_geral").once("value", () => { carregamentoInicial = false; });

        // Motor Realtime Blindado com Horário
        db.ref("chat_geral").limitToLast(20).on("child_added", (snap) => {
            const msg = snap.val();
            const caixa = document.getElementById('caixa-msg');
            const classeMinha = msg.autor === meuNome ? "minha-msg" : "";
            
            const div = document.createElement("div");
            div.className = "balao " + classeMinha;

            const nome = document.createElement("strong");
            nome.textContent = msg.autor;
            nome.style.color = "#00f2fe";
            nome.style.fontSize = "12px";

            const texto = document.createElement("div");
            texto.textContent = msg.texto;
            texto.style.marginTop = "2px";

            const hora = new Date(msg.data || Date.now());
            const horario = document.createElement("small");
            horario.textContent = hora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            div.appendChild(nome);
            div.appendChild(texto);
            div.appendChild(horario);
            caixa.appendChild(div);
            
            caixa.scrollTop = caixa.scrollHeight;

            if (!carregamentoInicial && msg.autor !== meuNome) {
                document.getElementById('somBip').play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            }
        });

        function enviarVibe() {
            const input = document.getElementById('minha-vibe');
            const texto = input.value.trim();
            if(texto) {
                db.ref("chat_geral").push({ 
                    autor: meuNome, 
                    texto: texto, 
                    data: Date.now() 
                });
                input.value = "";
            }
        }

        // Enviar com a tecla Enter do teclado do celular
        document.getElementById('minha-vibe').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') enviarVibe();
        });
    </script>
</body>
</html>
