<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - VERSÃO ESTÁVEL</title>
    <style>
        /* FUNDO DINÂMICO GALÁXIA */
        body { 
            margin: 0; 
            background: #000 url('https://img.freepik.com/fotos-gratis/fundo-da-galaxia-com-nebulosa-e-estrelas_23-2150826640.jpg') center/cover fixed; 
            font-family: sans-serif; color: white; overflow: hidden; 
        }
        
        /* JANELA DE CHAT (VIDRO) */
        #janela-chat { 
            position: fixed; top: 5%; left: 5%; width: 90%; height: 65%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); 
            border-radius: 35px; border: 2px solid #00f2fe; 
            display: flex; flex-direction: column; padding: 20px; z-index: 10;
        }
        #lista-msgs { flex: 1; overflow-y: auto; font-size: 24px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 15px; border-radius: 20px; margin-bottom: 12px; border-left: 5px solid #00f2fe; }
        
        /* ÁREA DE ENVIO */
        input { width: 90%; padding: 20px; border-radius: 15px; border: none; font-size: 20px; margin: 10px 0; }
        .btn-enviar { width: 100%; padding: 22px; border-radius: 20px; background: #00f2fe; border: none; font-weight: bold; font-size: 24px; color: black; }

        /* RODAPÉ DE IDENTIDADE (FOTO + NOME) */
        #identidade-footer { 
            position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 5;
        }
        .foto-mini { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #00f2fe; margin-bottom: 5px; }
    </style>
</head>
<body>
    <audio id="bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="janela-chat">
        <div id="lista-msgs"></div>
        <input id="txt" type="text" placeholder="Sua mensagem...">
        <button class="btn-enviar" onclick="enviar()">ENVIAR</button>
        <p style="text-align:center; color:gray; font-size:14px; margin-top:10px;">FECHAR</p>
    </div>

    <div id="identidade-footer">
        <img src="https://via.placeholder.com/150" class="foto-mini"><br>
        <b style="color:#00f2fe; font-size:14px;">ONLINE: Michel Detilli</b>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script>
        const config = { databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function enviar() {
            const input = document.getElementById('txt');
            if(input.value) {
                db.ref('chat_geral').push({ texto: input.value, autor: "Michel Detilli", data: Date.now() });
                input.value = "";
            }
        }

        db.ref('chat_geral').limitToLast(10).on('value', (s) => {
            const lista = document.getElementById('lista-msgs');
            lista.innerHTML = "";
            s.forEach(child => {
                lista.innerHTML += `<div class="balao"><b>${child.val().autor}:</b><br>${child.val().texto}</div>`;
            });
            try { document.getElementById('bip').play(); } catch(e){}
            lista.scrollTop = lista.scrollHeight;
        });
    </script>
</body>
</html>
