<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIO ONE - Oficial</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
body{ margin:0; background:radial-gradient(circle,#001219,#000); color:#fff; font-family:sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#caixa-msg{ flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px; }
.balao{ background:rgba(0,242,254,0.1); padding:10px 14px; border-radius:15px; max-width:80%; font-size:14px; border-left: 3px solid #00f2fe; }
.minha{ align-self:flex-end; background:rgba(255,255,255,0.1); border-left:none; border-right: 3px solid #fff; }
.hora{ font-size:10px; opacity:0.6; margin-top:4px; }
.controles{ display:flex; padding:10px; background:#000; gap:8px; border-top: 1px solid rgba(255,255,255,0.1); }
input{ flex:1; padding:12px; border-radius:20px; border:none; background:#111; color:#fff; outline:none; }
button{ width:50px; height:50px; border:none; border-radius:50%; background:#00f2fe; font-weight:bold; color:#000; cursor:pointer; }
</style>
</head>

<body>
<div id="caixa-msg"></div>

<div class="controles">
<input id="vibe-txt" placeholder="Sua vibe..." autocomplete="off">
<button onclick="enviar()">➤</button>
</div>

<audio id="som" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
  authDomain: "vibe-app-bbba2.firebaseapp.com",
  databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
  projectId: "vibe-app-bbba2",
  storageBucket: "vibe-app-bbba2.firebasestorage.app",
  messagingSenderId: "329513213082",
  appId: "1:329513213082:web:3938e86538bf8a04a05323"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let meuNome = localStorage.getItem("oio_nome") || prompt("Nome OIO ONE:") || "Michel";
localStorage.setItem("oio_nome", meuNome);

let ultimoEnvio = 0;

function formatarHora(ts){
  let d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
}

function sanitizar(texto){
  return texto.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

db.ref("chat_geral").limitToLast(15).on("child_added", snap=>{
  let msg = snap.val();
  let div = document.createElement("div");
  div.className="balao"+(msg.autor===meuNome?" minha":"");
  div.innerHTML = "<strong>"+sanitizar(msg.autor)+"</strong><br>"+sanitizar(msg.texto)+"<div class='hora'>"+formatarHora(msg.data || Date.now())+"</div>";
  document.getElementById("caixa-msg").appendChild(div);
  document.getElementById("caixa-msg").scrollTop=999999;
  if(msg.autor!==meuNome){
    document.getElementById("som").play().catch(()=>{});
    if(navigator.vibrate) navigator.vibrate(100);
  }
});

function enviar(){
  let input=document.getElementById("vibe-txt");
  let texto=input.value.trim();
  let agora=Date.now();
  if(!texto) return;
  if(agora-ultimoEnvio < 3000){
    alert("Espere 3 segundos (anti-spam)");
    return;
  }
  ultimoEnvio=agora;
  db.ref("chat_geral").push({ autor:meuNome, texto:texto, data:agora });
  input.value="";
}

document.getElementById("vibe-txt").addEventListener("keydown",e=>{
  if(e.key==="Enter") enviar();
});
</script>
</body>
</html>
