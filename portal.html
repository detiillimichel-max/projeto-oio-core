<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Portal Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #001219 0%, #000 100%); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px 16px; border-radius: 20px; border-left: 4px solid #00f2fe; max-width: 80%; align-self: flex-start; }
        .minha-msg { align-self: flex-end; border-left: none; border-right: 4px solid #fff; background: rgba(255,255,255,0.1); }
        .controles { padding: 15px; background: rgba(0,0,0,0.5); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; padding: 15px; border-radius: 25px; background: #111; border: none; color: #fff; outline: none; }
        button { width: 55px; height: 55px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="caixa-msg"></div>
    <div class="controles">
        <input id="vibe-txt" type="text" placeholder="Escreva sua vibe..." autocomplete="off">
        <button onclick="enviar()">🚀</button>
    </div>
    <audio id="somVip" src="https://www.soundjay.com/buttons/sounds/button-50.mp3"></audio>

    <script>
        // CONFIGURAÇÃO REAL QUE VOCÊ COPIOU DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:3938e86538bf8a04a05323"
        };

        // INICIALIZA O MOTOR
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let meuNome = localStorage.getItem("oio_nome") || prompt("Identidade OIO ONE - Seu nome:", "Michel") || "Visitante";
        localStorage.setItem("oio_nome", meuNome);

        let carregando = true;
        db.ref("chat_geral").once("value", () => { carregando = false; });

        db.ref("chat_geral").limitToLast(15).on("child_added", (snap) => {
            const msg = snap.val();
            const caixa = document.getElementById("caixa-msg");
            const div = document.createElement("div");
            div.className = "balao" + (msg.autor === meuNome ? " minha-msg" : "");
            div.innerHTML = `<strong>${msg.autor}</strong><br>${msg.texto}`;
            caixa.appendChild(div);
            caixa.scrollTop = caixa.scrollHeight;

            if (!carregando && msg.autor !== meuNome) {
                document.getElementById("somVip").play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate(200);
            }
        });

        function enviar() {
            const input = document.getElementById("vibe-txt");
            if (input.value.trim()) {
                db.ref("chat_geral").push({
                    autor: meuNome,
                    texto: input.value,
                    data: Date.now()
                });
                input.value = "";
            }
        }

        // Enviar com a tecla Enter
        document.getElementById("vibe-txt").addEventListener("keypress", (e) => {
            if (e.key === "Enter") enviar();
        });
    </script>
</body>
</html>
