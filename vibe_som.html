<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - TESTE DE SOM</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        #caixa-msg { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 90px; }
        .balao { background: rgba(0, 242, 254, 0.1); padding: 12px; border-radius: 18px; border-left: 4px solid #00f2fe; max-width: 80%; }
        .minha { align-self: flex-end; border-left: none; border-right: 4px solid #fff; background: rgba(255,255,255,0.1); }
        .controles { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #111; display: flex; align-items: center; gap: 8px; box-sizing: border-box; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 16px; outline: none; }
        .btn-enviar { width: 50px; height: 50px; border-radius: 50%; border: none; background: #00f2fe; color: #000; font-weight: bold; font-size: 20px; }
        #aviso-som { position: fixed; top: 0; width: 100%; background: #00f2fe; color: #000; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; z-index: 200; }
    </style>
</head>
<body onclick="ativarAudio()">
    <div id="aviso-som">Toque na tela para ATIVAR O SOM 🔊</div>
    <div id="caixa-msg"></div>
    <div class="controles">
        <input id="msg-input" placeholder="Teste o som aqui..." autocomplete="off">
        <button class="btn-enviar" onclick="enviar()">➤</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBG3oBoBvOwySN64gR6CgCcXTo2DG-av60",
            authDomain: "vibe-app-bbba2.firebaseapp.com",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
            projectId: "vibe-app-bbba2",
            storageBucket: "vibe-app-bbba2.firebasestorage.app",
            messagingSenderId: "329513213082",
            appId: "1:329513213082:web:3938e86538bf8a04a05323"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let meuNome = localStorage.getItem("oio_nome") || prompt("Seu Nome:") || "Michel";
        localStorage.setItem("oio_nome", meuNome);

        // SONS DE ALTA FORÇA
        const somEnvio = new Audio("https://actions.google.com/sounds/v1/foley/mechanical_clog_hit.ogg");
        const somRecebido = new Audio("https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3");

        function ativarAudio() {
            somEnvio.play().then(() => somEnvio.pause());
            somRecebido.play().then(() => somRecebido.pause());
            document.getElementById("aviso-som").style.display = "none";
            console.log("Sistema de Áudio OIO ONE Ativo");
        }

        db.ref("chat_geral").limitToLast(10).on("child_added", snap => {
            const msg = snap.val();
            const div = document.createElement("div");
            div.className = "balao" + (msg.autor === meuNome ? " minha" : "");
            div.innerHTML = `<strong>${msg.autor}</strong><br>${msg.texto}`;
            document.getElementById("caixa-msg").appendChild(div);
            document.getElementById("caixa-msg").scrollTop = 999999;
            
            if(msg.autor !== meuNome) {
                somRecebido.play().catch(() => {});
                if(navigator.vibrate) navigator.vibrate([200, 100, 200]); // Camada Sensorial
            }
        });

        function enviar() {
            const input = document.getElementById("msg-input");
            if (input.value.trim()) {
                db.ref("chat_geral").push({ autor: meuNome, texto: input.value, data: Date.now() });
                somEnvio.play().catch(() => {});
                input.value = "";
            }
        }
    </script>
</body>
</html>
